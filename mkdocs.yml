          - Como configurar um Grupo de Usuário: como-fazer/configurar-grupo-usuario.md
      - Comercial:
          - Como cadastrar um cliente: como-fazer/cadastrar-cliente.md
          - Como cadastrar um fornecedor: como-fazer/cadastrar-fornecedor.md
          - Como criar um orçamento: como-fazer/criar-orcamento.md
          - Como gerar um pedido: como-fazer/fazer-pedido-venda.md
      - Estoque:
