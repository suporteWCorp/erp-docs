site_name: Guia WCorp
site_description: Central de ajuda do WCorp para usuários, suporte e desenvolvimento.
site_author: WCorp
site_url: https://suportewcorp.github.io/erp-docs/

theme:
  name: material
  custom_dir: overrides
  language: pt-BR
  logo: assets/wcorp-logo.png
  favicon: assets/wcorp-logo.png
  palette:
    - scheme: default
      primary: teal
      accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

nav:
  - Início: index.md
  - Guia:
      - Visão geral: como-fazer/index.md
      - Administração:
          - Como cadastrar uma Natureza de Operação: como-fazer/cadastrar-natureza-operacao.md
          - Como cadastrar uma Condição de Pagamento: como-fazer/cadastrar-condicao-pagamento.md
          - Como cadastrar um Centro de Custo: como-fazer/cadastrar-centro-custo.md
