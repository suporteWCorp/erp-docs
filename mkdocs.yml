markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path:
        - docs
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - extra.css
  - assets/stylesheets/cards.css
  - assets/stylesheets/header.css
  - assets/stylesheets/knowledge-base.css
  - assets/stylesheets/alerts.css
  - assets/stylesheets/context-help.css
  - assets/stylesheets/favorites.css

extra_javascript:
  - assets/javascripts/wcorp-header.js
  - assets/javascripts/wcorp-nav.js
  - assets/javascripts/wcorp-video.js
  - assets/javascripts/wcorp-errors.js
  - assets/javascripts/wcorp-context-help.js
  - assets/javascripts/wcorp-favorites.js

plugins:
  - search:
      lang: pt
  - glightbox


