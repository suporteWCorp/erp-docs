          - Como emitir uma devolução: como-fazer/emitir-devolucao.md
          - Como emitir uma carta de correção: como-fazer/emitir-carta-correcao.md
          - Como emitir uma nota complementar: como-fazer/emitir-nota-complementar.md
      - Compras:
